name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: make build
      - name: Validate hardware acceptance harness
        run: |
          bash -n scripts/hardware-acceptance.sh scripts/test-hardware-acceptance.sh
          bash scripts/test-hardware-acceptance.sh
