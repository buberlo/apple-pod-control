replicaCount: 1

image:
  repository: docker.io/library/nginx
  tag: alpine
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

topologySpread:
  enabled: true
  whenUnsatisfiable: ScheduleAnyway

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 128Mi
