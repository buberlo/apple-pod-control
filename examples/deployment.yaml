apiVersion: apc.dev/v1alpha1
kind: Deployment
metadata:
  name: web
  namespace: default
  labels:
    app.kubernetes.io/name: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: web
    spec:
      nodeSelector:
        apc.dev/architecture: arm64
      containers:
        - name: web
          image: docker.io/library/nginx:alpine
          ports:
            - name: http
              containerPort: 80
              hostPort: 8080
              hostIP: 0.0.0.0
              protocol: TCP
          env:
            - name: APC_ENV
              value: production
          resources:
            requests:
              cpu: 1
              memory: 512M
            limits:
              cpu: 2
              memory: 1G
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 1
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

